<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FX SNIPER KITCHEN II</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background-color: #050505; color: #E5E7EB; font-family: 'Inter', sans-serif; }
        .gold-border { border: 1px solid #D4AF37; }
        .bg-gold-gradient { background: linear-gradient(135deg, #463914 0%, #050505 100%); }
        .text-gold { color: #D4AF37; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [journal, setJournal] = useState(() => JSON.parse(localStorage.getItem('sniper_journal_v4') || '[]'));
            const [baseStats, setBaseStats] = useState(() => JSON.parse(localStorage.getItem('sniper_base_stats') || '{ "balance": 100, "r": 0, "wins": 0 }'));
            const [logo, setLogo] = useState(localStorage.getItem('sniper_logo') || null);

            useEffect(() => {
                localStorage.setItem('sniper_journal_v4', JSON.stringify(journal));
                localStorage.setItem('sniper_base_stats', JSON.stringify(baseStats));
            }, [journal, baseStats]);

            const totalProfit = journal.reduce((acc, t) => acc + (t.cash || 0), 0);
            const totalR = baseStats.r + journal.reduce((acc, t) => acc + (t.r || 0), 0);
            const balance = baseStats.balance + totalProfit;
            const wins = baseStats.wins + journal.filter(t => t.result === 'Win').length;
            const totalTrades = journal.filter(t => t.result !== 'Veto').length;
            const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(0) : 0;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* HEADER */}
                    <header className="glass gold-border p-6 rounded-t-3xl border-b-0 flex flex-col md:flex-row items-center gap-6">
                        <label className="w-24 h-24 rounded-full bg-black border-2 border-gold-border flex items-center justify-center cursor-pointer overflow-hidden shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                            <input type="file" className="hidden" accept="image/*" onChange={(e) => {
                                const reader = new FileReader();
                                reader.onload = (ev) => { setLogo(ev.target.result); localStorage.setItem('sniper_logo', ev.target.result); };
                                reader.readAsDataURL(e.target.files[0]);
                            }} />
                            {logo ? <img src={logo} className="w-full h-full object-cover" /> : <span className="text-[10px] text-gold text-center">UPLOAD<br/>LOGO</span>}
                        </label>
                        <div className="text-center md:text-left">
                            <h1 className="font-['Cinzel'] text-2xl md:text-4xl text-gold uppercase tracking-widest">FX SNIPER KITCHEN II</h1>
                            <p className="text-[10px] text-slate-400 italic mt-2">"Ponder the path of thy feet, and let all thy ways be established." — Proverbs 4:26 📖⚖️</p>
                        </div>
                    </header>

                    {/* NAV */}
                    <nav className="glass gold-border p-2 flex gap-2">
                        {['dashboard', 'journal', 'import'].map(t => (
                            <button key={t} onClick={() => setView(t)} className={`flex-1 py-3 text-[10px] font-bold uppercase tracking-widest transition-all ${view === t ? 'bg-gold-gradient text-white' : 'text-gold hover:bg-white/5'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    {/* MAIN */}
                    <main className="glass gold-border p-6 rounded-b-3xl">
                        {view === 'dashboard' && <Dashboard balance={balance} rTotal={totalR} winRate={winRate} wins={wins} />}
                        {view === 'journal' && <JournalList journal={journal} />}
                        {view === 'import' && <BulkImport onImport={(data) => setJournal([...journal, ...data])} />}
                    </main>
                </div>
            );
        };

        const Dashboard = ({ balance, rTotal, winRate, wins }) => (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {[
                    { l: 'DEMO BALANCE', v: `$${balance.toFixed(2)}` },
                    { l: 'R-TOTAL', v: `${rTotal.toFixed(2)}R` },
                    { l: 'WIN RATE', v: `${winRate}%` },
                    { l: 'EXTRACTIONS', v: `${wins} / 50` }
                ].map((stat, i) => (
                    <div key={i} className="bg-black p-4 border border-gold-border text-center">
                        <div className="text-[9px] text-slate-500 tracking-widest mb-1">{stat.l}</div>
                        <div className="text-xl font-bold text-gold font-['JetBrains_Mono']">{stat.v}</div>
                    </div>
                ))}
            </div>
        );

        const BulkImport = ({ onImport }) => {
            const [text, setText] = useState('');
            const parse = () => {
                const lines = text.split('Day');
                const parsed = lines.map(block => {
                    if (!block.includes('Profit') && !block.includes('TP HIT')) return null;
                    const isWin = block.includes('TP HIT') || block.includes('+1.5R');
                    const cashMatch = block.match(/\$([0-9.]+)/);
                    const cash = cashMatch ? parseFloat(cashMatch[1]) : 0;
                    return {
                        id: Date.now() + Math.random(),
                        date: 'Bulk',
                        result: isWin ? 'Win' : 'Loss',
                        r: isWin ? 1.5 : -1.0,
                        cash: isWin ? cash : -cash,
                        notes: 'Bulk Imported'
                    };
                }).filter(x => x);
                onImport(parsed);
                alert(`Imported ${parsed.length} trades.`);
            };

            return (
                <div className="space-y-4">
                    <h2 className="text-gold font-bold uppercase tracking-widest text-sm">Bulk Import History</h2>
                    <textarea value={text} onChange={e => setText(e.target.value)} className="w-full h-64 bg-black border border-gold-border p-4 text-[10px] text-white font-mono" placeholder="Paste your entire journal text here..."></textarea>
                    <button onClick={parse} className="bg-gold-gradient w-full py-2 font-bold text-black uppercase tracking-widest">Process Data</button>
                </div>
            );
        };

        const JournalList = ({ journal }) => (
            <div className="space-y-2">
                {journal.map((t, i) => (
                    <div key={i} className="flex justify-between p-3 bg-black border border-slate-800 text-[10px] font-mono">
                        <span>{t.result}</span>
                        <span>{t.cash > 0 ? '+' : ''}${t.cash.toFixed(2)}</span>
                    </div>
                ))}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
